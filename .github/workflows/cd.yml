name: 🚀 CD — Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Deploy Preview (on Pull Requests)
  # ─────────────────────────────────────────────
  deploy-preview:
    name: 🔵 Preview Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment:
      name: Preview
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 🔗 Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to Preview
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$url" >> $GITHUB_OUTPUT
          echo "✅ Preview deployed to: $url"

      - name: 💬 Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = "${{ steps.deploy.outputs.preview_url }}";
            const body = `## 🚀 Preview Deployment Ready!

            | Info | Details |
            |------|---------|
            | 🔗 **Preview URL** | [${previewUrl}](${previewUrl}) |
            | 📦 **Commit** | \`${{ github.sha }}\` |
            | 🌿 **Branch** | \`${{ github.head_ref }}\` |
            | 🕐 **Deployed** | ${new Date().toUTCString()} |

            > 🔵 This is a **preview** deployment. Changes will go live after merging to \`main\`.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ─────────────────────────────────────────────
  # JOB 2: Deploy Production (on push to main)
  # ─────────────────────────────────────────────
  deploy-production:
    name: 🟢 Production Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: Production
      url: ${{ steps.deploy.outputs.production_url }}
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 🔗 Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to Production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "production_url=$url" >> $GITHUB_OUTPUT
          echo "✅ Production deployed to: $url"

      - name: 📋 Write deployment summary
        run: |
          echo "## 🟢 Production Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 **URL** | ${{ steps.deploy.outputs.production_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 👤 **Author** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🕐 **Time** | $(date -u) |" >> $GITHUB_STEP_SUMMARY
